<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Файно свято</title>

    <link
      rel="preload"
      fetchpriority="high"
      as="image"
      type="image/avif"
      href="/img/avif/Hero_Mobile@1x.avif"
      imagesrcset="
        /img/avif/Hero_Mobile@1x.avif 1x,
        /img/avif/Hero_Mobile@2x.avif 2x"
      media="(max-width: 767.99px)"
    />
    <link
      rel="preload"
      fetchpriority="high"
      as="image"
      type="image/avif"
      href="/img/avif/Hero_Tablet@1x.avif"
      imagesrcset="
        /img/avif/Hero_Tablet@1x.avif 1x,
        /img/avif/Hero_Tablet@2x.avif 2x
      "
      media="(min-width: 768px) and (max-width: 1439.99px)"
    />
    <link
      rel="preload"
      fetchpriority="high"
      as="image"
      type="image/avif"
      href="/img/avif/Hero_Desktop@1x.avif"
      srcset="
        /img/avif/Hero_Desktop@1x.avif 1x,
        /img/avif/Hero_Desktop@2x.avif 2x
      "
      media="(min-width: 1440px)"
    />

    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <load src="./partials/header.html" icon-path="img/sprite.svg#logo" />
    <load src="./partials/navbar.html" />

    <main>
      <load src="./partials/hero.html" />
      <load src="./partials/event-list.html" />
      <load src="./partials/about-us.html" />
      <load src="./partials/faq.html" />
      <load src="./partials/feedback.html" />
    </main>

    <load src="./partials/footer.html" />
    <!-- MODAL WINDOWS -->
    <load src="./partials/event-details-modal.html" />
    <load src="./partials/booking-modal.html" />

    <script type="module" src="./main.js"></script>
  </body>
</html>
